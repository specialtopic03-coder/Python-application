<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zara 線上商品</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; padding: 20px; 
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { 
            text-align: center; background: white; padding: 30px; 
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 30px; 
        }
        h1 { 
            color: #2c3e50; font-size: 2.5em; margin-bottom: 10px; 
            background: linear-gradient(135deg, #e74c3c, #c0392b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        .status { 
            color: #27ae60; font-size: 1.2em; font-weight: 600; 
            background: #d4edda; padding: 12px 24px; border-radius: 30px; display: inline-block; 
        }

        /* 導覽列優化 */
        .nav { 
            display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; 
        }
        .nav-label { font-weight: 700; color: #34495e; font-size: 1.1em; }
        
        /* 下拉選單樣式優化 */
        .styled-select {
            padding: 10px 20px; border-radius: 15px; border: 2px solid #34495e;
            background: white; font-weight: 600; color: #2c3e50; cursor: pointer; outline: none;
        }

        /* 按鈕樣式 */
        .btn { 
            padding: 12px 25px; color: white; text-decoration: none; border-radius: 30px; 
            font-weight: 600; border: none; cursor: pointer; transition: all 0.3s; 
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-dark { background: #2c3e50; box-shadow: 0 5px 15px rgba(44,62,80,0.3); }
        .btn-danger { background: #e74c3c; box-shadow: 0 5px 15px rgba(231,76,60,0.3); }
        .btn-cart { background: #3498db; box-shadow: 0 5px 15px rgba(52,152,219,0.3); }
        
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        /* 商品區塊 */
        .main-content { margin-top: 20px; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .product { 
            background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            transition: all 0.4s; position: relative; overflow: hidden; 
        }
        .product:hover { transform: translateY(-10px); }
        .product-source { 
            position: absolute; top: 15px; right: 15px; background: #27ae60; 
            color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; 
        }
        .product img { width: 100%; height: 320px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
        .name { font-weight: 800; font-size: 1.3em; color: #2c3e50; margin-bottom: 12px; height: 3.5em; overflow: hidden; }
        .price { font-size: 1.8em; font-weight: 900; color: #e74c3c; margin-bottom: 20px; }
        
        .select { 
            background: #f8f9fa; padding: 15px; border-radius: 15px; 
            display: flex; align-items: center; 
        }
        .select input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: #27ae60; }

        .controls { 
            background: white; padding: 30px; border-radius: 25px; text-align: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); margin-top: 40px; 
        }
        .order-btn { 
            background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; 
            padding: 18px 45px; font-size: 1.2em; font-weight: 800; border-radius: 50px; 
            cursor: pointer; transition: all 0.3s; 
        }
        .cart-badge { 
            background: #f1c40f; color: #2c3e50; 
            border-radius: 50%; padding: 2px 10px; font-weight: 800; font-size: 0.9em; margin-left: 8px;
        }
        
        .current-category { text-align: center; font-size: 1.2em; color: #7f8c8d; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Zara 線上商品</h1>
            <div class="status">
                Selenium抓取 {{ products|length }} 件商品 • 
                <a href="debug_selenium.png" style="color: #27ae60; text-decoration: none;">查看截圖</a>
            </div>
        </div>

        <div class="nav">
            <a href="/" class="btn btn-dark">🏠 返回主頁</a>
            
            <div class="nav-group">
                <span class="nav-label">男士系列：</span>
                <select class="styled-select" onchange="if(this.value) window.location.href='?item=' + encodeURIComponent(this.value);">
                    <option value="">請選擇項目</option>
                    {% for name in url_map.keys() %}
                        {% if name[:3] == '男士-' %}
                            <option value="{{ name }}" {% if item == name %}selected{% endif %}>
                                {{ name }}
                            </option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="nav-group">
                <span class="nav-label">女士系列：</span>
                <select class="styled-select" onchange="if(this.value) window.location.href='?item=' + encodeURIComponent(this.value);">
                    <option value="">請選擇項目</option>
                    {% for name in url_map.keys() %}
                        {% if name[:3] == '女士-' %}
                            <option value="{{ name }}" {% if item == name %}selected{% endif %}>
                                {{ name }}
                            </option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>

            <a href="/zara_shop/order" class="btn btn-cart">
                🛒 我的訂單 <span class="cart-badge">{{ order|length }}</span>
            </a>
            <a href="/logout" class="btn btn-danger">🚪 登出系統</a>
        </div>

        <div class="current-category">
            當前查看：<span id="slug-text"></span>
        </div>

           <div class="main-content">
                <div class="products">
                    {% for product in products %}
                    <div class="product">
                        <form method="POST" action="/zara_shop/add">
                            <div class="product-source">ZARA</div>
                            <img src="{{ product.圖片 }}">
                            <div class="name">{{ product.名稱 }}</div>
                            <div class="price">{{ product.價格 }}</div>
                            
                            <input type="hidden" name="product_id" value="{{ product.名稱 }}">
                            
                            <div class="select" style="display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 10px;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <label>尺寸:</label>
                                    <select name="size" class="styled-select" style="width: 60%; padding: 5px;">
                                        <option value="S">S</option>
                                        <option value="M" selected>M</option>
                                        <option value="L">L</option>
                                        <option value="XL">XL</option>
                                    </select>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <label>數量:</label>
                                    <input type="number" name="quantity" value="1" min="1" style="width: 60%; padding: 5px; border-radius: 8px; border: 1px solid #ccc;">
                                </div>
                                
                                <button type="submit" class="btn btn-cart" style="margin-top: 10px; width: 100%; font-size: 0.9em;">
                                    🛒 加入購物車
                                </button>
                            </div>
                        </form>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <form id="clear-form" method="POST" action="/zara_shop/clear" style="display: none;"></form>
        </div>
    </div>

    <script>
        // 取得網址參數
        const urlParams = new URLSearchParams(window.location.search);
        const currentItem = urlParams.get('item');
    
        // 如果有 item 參數，就解碼顯示；否則顯示「所有商品」
        const displayText = currentItem ? decodeURIComponent(currentItem) : '所有商品';
        document.getElementById('slug-text').textContent = displayText;
    </script>
</body>
</html>
